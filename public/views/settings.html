<main class="settings-page">
    <section class="settings-shell">
        <div class="section-head">
            <div class="section-head-copy">
                <div class="section-head-title">Ustawienia</div>
                <div class="section-head-subtitle">Podstawowe informacje o koncie i aktualnej sesji.</div>
            </div>
        </div>

        <div class="settings-grid">
            <article class="settings-panel">
                <div class="settings-panel-kicker">Konto</div>
                <h1 class="settings-panel-title">Profil użytkownika</h1>

                <div class="settings-list">
                    <div class="settings-row">
                        <span class="settings-label">Imię i nazwisko</span>
                        <span class="settings-value"><?= htmlspecialchars($currentUser['full_name'] ?? 'Brak danych', ENT_QUOTES, 'UTF-8'); ?></span>
                    </div>

                    <div class="settings-row">
                        <span class="settings-label">Login</span>
                        <span class="settings-value"><?= htmlspecialchars($currentUser['username'] ?? 'Brak danych', ENT_QUOTES, 'UTF-8'); ?></span>
                    </div>

                    <div class="settings-row">
                        <span class="settings-label">Email</span>
                        <span class="settings-value"><?= htmlspecialchars($currentUser['email'] ?? 'Brak danych', ENT_QUOTES, 'UTF-8'); ?></span>
                    </div>

                    <div class="settings-row">
                        <span class="settings-label">Plan</span>
                        <span class="settings-value"><?= htmlspecialchars(strtoupper((string) ($currentUser['membership_tier'] ?? 'free')), ENT_QUOTES, 'UTF-8'); ?></span>
                    </div>

                    <div class="settings-row">
                        <span class="settings-label">Data utworzenia</span>
                        <span class="settings-value">
                            <?= !empty($currentUser['created_at']) ? htmlspecialchars((new DateTimeImmutable($currentUser['created_at']))->format('d.m.Y'), ENT_QUOTES, 'UTF-8') : 'Brak danych'; ?>
                        </span>
                    </div>
                </div>
            </article>

            <article class="settings-panel settings-panel-danger">
                <div class="settings-panel-kicker">Sesja</div>
                <h2 class="settings-panel-title">Wylogowanie</h2>
                <p class="settings-panel-copy">Zakończ aktualną sesję i wróć do ekranu logowania.</p>

                <form method="post" action="/logout" class="settings-actions">
                    <button type="submit" class="settings-logout-button">Wyloguj się</button>
                </form>
            </article>
        </div>
    </section>
</main>
